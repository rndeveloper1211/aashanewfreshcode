apply plugin: "com.android.application"
apply plugin: "com.facebook.react"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.google.gms.google-services"

apply from: "../../node_modules/react-native-vector-icons/fonts.gradle"

react {
    hermesEnabled = true
}

def enableProguardInReleaseBuilds = true

android {
    namespace "com.maxuspayy"
    compileSdk rootProject.ext.compileSdkVersion
        ndkVersion rootProject.ext.ndkVersion


    defaultConfig {
        applicationId "com.maxuspayy"
        minSdk rootProject.ext.minSdkVersion
        targetSdk rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "0.0.1"
        multiDexEnabled true

        ndk {
            abiFilters "armeabi-v7a", "arm64-v8a"
        }

        externalNativeBuild {
          cmake {
            arguments "-DANDROID_STL=c++_shared",
                      "-DANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES=ON"
            // ⚠️ LEGACY_TOOLCHAIN_FILE hata diya — 16 KB ke saath conflict karta hai
        }
        }
    }

    externalNativeBuild {
        cmake {
version "3.22.1" // Change from 3.31.6
        }
    }

    signingConfigs {
        debug {}
        release {
            if (project.hasProperty('MYAPP_UPLOAD_STORE_FILE')) {
                storeFile file(MYAPP_UPLOAD_STORE_FILE)
                storePassword MY_KEYSTORE_PASSWORD
                keyAlias MY_KEY_ALIAS
                keyPassword MY_KEY_PASSWORD
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled enableProguardInReleaseBuilds
            shrinkResources true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }

    packagingOptions {
        resources {
            excludes += '/META-INF/{AL2.0,LGPL2.1}'
            excludes += 'META-INF/*.kotlin_module'
        }
        jniLibs {
            useLegacyPackaging = false
            pickFirsts += ['**/libc++_shared.so']
            excludes += ['**/libandroidlame.so']
        }
    }

    buildFeatures {
        prefab true
        buildConfig true
        viewBinding true
    }
}

configurations.all {
    resolutionStrategy {
        force 'com.facebook.react:react-android:0.76.5'
        force 'com.facebook.react:hermes-android:0.76.5'
        force 'androidx.lifecycle:lifecycle-viewmodel:2.8.7'
        force 'androidx.lifecycle:lifecycle-viewmodel-ktx:2.8.7'
        force 'androidx.lifecycle:lifecycle-runtime:2.8.7'
        force 'androidx.lifecycle:lifecycle-runtime-ktx:2.8.7'
    }
}

dependencies {
    implementation 'com.google.android.play:integrity:1.4.0'
    implementation 'com.google.android.gms:play-services-location:21.0.1'
    implementation "androidx.activity:activity:1.9.0"
    implementation "androidx.core:core-ktx:1.13.1"
