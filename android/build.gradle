buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion = 24
        compileSdkVersion = 35
        targetSdkVersion = 35
ndkVersion = "27.1.12297006"    // ← 27 wapas
        kotlinVersion = "1.9.24"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.6.0")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
        classpath("com.google.gms:google-services:4.4.2")
        classpath("com.facebook.react:react-native-gradle-plugin")
    }
}

allprojects {
    repositories {
        maven { url("$rootDir/../node_modules/react-native/android") }
        maven { url("$rootDir/../node_modules/soloader/android") }
        google()
        mavenCentral()
        flatDir { dirs "$rootDir/app/libs" }
        maven {
            credentials {
                username project.findProperty("MAVEN_USERNAME") ?: ""
                password project.findProperty("MAVEN_PASSWORD") ?: ""
            }
            url "https://mymavenrepo.com/repo/FrQdp1FhEvW3jjbX8Md4/"
        }
        maven { url 'https://www.jitpack.io' }
    }
}
